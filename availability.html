<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Availability | SaaS Product</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1e4fd8;
            --bg-gradient: linear-gradient(135deg, #f8fafc, #eef2ff);
            --card-bg: #ffffff;
            --text-color: #111827;
            --muted-text: #6b7280;
            --border-color: #e5e7eb;
            --shadow-sm: 0 0.125rem 0.375rem rgba(0, 0, 0, 0.05);
            --shadow-md: 0 0.375rem 1.125rem rgba(0, 0, 0, 0.08);
            --radius-card: 0.875rem;
            --radius-input: 0.5rem;
            --transition: all 0.2s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4rem;
            background: white;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 1000;
        }

        .app-name {
            font-weight: 600;
            font-size: 1.125rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .language-select {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-input);
            padding: 0.375rem 0.625rem;
            font-size: 0.8125rem;
            background: white;
            cursor: pointer;
        }

        .language-select:hover {
            background: rgba(37, 99, 235, 0.08);
        }

        /* HAMBURGER (mobile only) */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
        }

        .hamburger span {
            width: 22px;
            height: 2px;
            background: var(--text-color);
            transition: var(--transition);
        }

        /* USER MENU */
        .user-menu {
            position: relative;
        }

        .avatar {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 50%;
            background: #d1d5db;
            cursor: pointer;
        }

        .user-dropdown {
            position: absolute;
            right: 0;
            top: 3rem;
            width: 14.375rem;
            background: var(--card-bg);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-md);
            padding: 0.875rem;
            display: none;
            flex-direction: column;
        }

        .user-dropdown.open {
            display: flex;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .user-email {
            font-size: 0.75rem;
            color: var(--muted-text);
            margin-bottom: 0.625rem;
        }

        .dropdown-divider {
            height: 0.0625rem;
            background: var(--border-color);
            margin: 0.625rem 0;
        }

        .dropdown-item {
            padding: 0.5rem 0.625rem;
            border-radius: var(--radius-input);
            font-size: 0.875rem;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: rgba(37, 99, 235, 0.08);
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            top: 4rem;
            left: 0;
            width: 15.625rem;
            bottom: 0;
            background: var(--card-bg);
            box-shadow: var(--shadow-sm);
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease;
        }

        .sidebar-top {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
        }

        .sidebar-bottom {
            margin-bottom: 0.625rem;
        }

        .sidebar-divider {
            height: 0.0625rem;
            background: var(--border-color);
            margin: 0.75rem 0;
        }

        .menu-item {
            padding: 0.625rem 0.75rem;
            border-radius: var(--radius-input);
            cursor: pointer;
            font-size: 0.875rem;

            /* 🔹 Agregar estas 3 líneas */
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .menu-item:hover {
            background: rgba(37, 99, 235, 0.08);
        }

        .menu-item.active {
            background: rgba(37, 99, 235, 0.12);
            color: var(--primary-color);
            font-weight: 500;
        }

        /* OVERLAY (mobile) */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 900;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* MAIN */
        .main {
            margin-top: 4rem;
            margin-left: 15.625rem;
            padding: 2.5rem;
            width: 100%;
            overflow-y: auto;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .page-subtitle {
            font-size: 0.875rem;
            color: var(--muted-text);
            margin-bottom: 2rem;
        }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-sm);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--muted-text);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
        }

        .popular-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-sm);
        }

        .popular-time {
            font-size: 2.5rem;
            font-weight: 600;
            margin: 0.75rem 0;
        }

        /* ===============================
       📱 RESPONSIVE MOBILE
    ================================= */
        @media (max-width: 768px) {

            body {
                overflow: auto;
            }

            .hamburger {
                display: flex;
            }

            .sidebar {
                transform: translateX(-100%);
                z-index: 1000;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
                padding: 1.25rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===============================
   📅 SWITCH DISPONIBILIDAD
=================================*/

        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .switch input {
            display: none;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        .switch input:checked+.slider {
            background-color: var(--primary-color);
        }

        .switch input:checked+.slider:before {
            transform: translateX(22px);
        }
    </style>
</head>

<body>

    <div class="header">
        <div style="display:flex; align-items:center; gap:1rem;">
            <div class="hamburger" onclick="toggleSidebar()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="app-name" data-i18n="appName">MyProduct</div>
        </div>

        <div class="header-right">
            <select class="language-select" onchange="setLanguage(this.value)">
                <option value="en">EN</option>
                <option value="es">ES</option>
            </select>

            <div class="user-menu">
                <div class="avatar" onclick="toggleUserMenu()"></div>
                <div class="user-dropdown" id="userDropdown">
                    <div class="user-name">John Doe</div>
                    <div class="user-email" id="userEmail"></div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" data-i18n="settings">Settings</div>
                    <div class="dropdown-item" data-i18n="logout" onclick="logout()">Log out</div>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar">
        <div class="sidebar-top">
            <div class="menu-item" data-i18n="dashboard">Dashboard</div>
            <a href="event-types.html" class="menu-item" data-i18n="eventTypes">
                Event Types
            </a>
            <div class="menu-item" data-i18n="appointments">Appointments</div>
            <a href="calendar.html" class="menu-item" data-i18n="calendar">
                Calendar
            </a>
            <div class="menu-item active" data-i18n="availability">Availability</div>
        </div>
        <div class="sidebar-bottom">
            <div class="sidebar-divider"></div>
            <div class="menu-item" data-i18n="feedback">Give feedback</div>
        </div>
    </div>

    <div class="main">

        <div class="page-title" data-i18n="availability">Disponibilidad</div>
        <div class="page-subtitle" data-i18n="availabilitySubtitle"></div>
        <!-- ZONA HORARIA -->
        <div class="popular-card" style="margin-bottom:2rem;">
            <div class="stat-label" data-i18n="timezone"></div> <select id="timezone"
                style="margin-top:10px; padding:8px; border-radius:8px; border:1px solid #ddd;">
                <option value="America/Argentina/Buenos_Aires">(GMT-3) Buenos Aires</option>
                <option value="America/New_York">(GMT-5) New York</option>
                <option value="Europe/Madrid">(GMT+1) Madrid</option>
            </select>
        </div>

        <!-- DISPONIBILIDAD SEMANAL -->
        <div class="popular-card">
            <div class="stat-label" style="margin-bottom:10px;" data-i18n="weeklyAvailability"></div>
            <button onclick="applyWeekdays()" data-i18n="applyWeekdays"
                style="margin-bottom:20px; background:#f3f4f6; border:none; padding:8px 14px; border-radius:8px; cursor:pointer;">
            </button>

            <div id="weeklyContainer"></div>
        </div>

        <button onclick="saveAvailability()" data-i18n="saveAvailability"
            style="margin-top:2rem; background:var(--primary-color); color:white; border:none; padding:12px 20px; border-radius:10px; cursor:pointer;">
        </button>

    </div>

    <script>
        /* ===============================
           🔐 PROTECCIÓN DE SESIÓN
        ================================= */
        /* function checkAuth() {
           const isLoggedIn = localStorage.getItem("isLoggedIn");
           if (!isLoggedIn) {
             window.location.href = "login.html";
           }
         }
         checkAuth(); 
     */

        /* ===============================
           🌍 TRADUCCIONES
        ================================= */
        const translations = {
            en: {
                pageTitle: "Availability",
                appName: "MyProduct",
                dashboard: "Dashboard",
                dashboardTitle: "Dashboard Overview",
                dashboardSubtitle: "Summary of your scheduling activity",
                totalEvents: "Total Event Types",
                booked: "Booked Appointments",
                completed: "Completed",
                cancelled: "Cancelled",
                popularTime: "Most Popular Time",
                popularTimeSub: "Based on all booked appointments",
                eventTypes: "Event Types",
                appointments: "Appointments",
                calendar: "Calendar",
                availability: "Availability",
                settings: "Settings",
                logout: "Log out",
                feedback: "Give feedback",
                availabilitySubtitle: "Define your recurring weekly availability.",
                timezone: "Time Zone",
                weeklyAvailability: "Weekly availability",
                applyWeekdays: "Apply same hours to Monday–Friday",
                addTimeSlot: "+ Add time slot",
                saveAvailability: "Save Availability",
                savedMessage: "Availability saved successfully",
                days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"]
            },
            es: {
                pageTitle: "Disponibilidad",
                appName: "MyProduct",
                dashboard: "Inicio",
                dashboardTitle: "Resumen general",
                dashboardSubtitle: "Resumen de tu actividad de reservas",
                totalEvents: "Total de tipos de evento",
                booked: "Citas reservadas",
                completed: "Citas realizadas",
                cancelled: "Citas canceladas",
                popularTime: "Horario más popular",
                popularTimeSub: "Basado en todas las citas reservadas",
                eventTypes: "Tipos de eventos",
                appointments: "Citas",
                calendar: "Calendario",
                availability: "Disponibilidad",
                settings: "Configuración",
                logout: "Cerrar sesión",
                feedback: "Dar feedback",
                availabilitySubtitle: "Define tu disponibilidad recurrente semanal.",
                timezone: "Zona Horaria",
                weeklyAvailability: "Disponibilidad semanal",
                applyWeekdays: "Aplicar mismo horario a Lunes–Viernes",
                addTimeSlot: "+ Añadir franja horaria",
                saveAvailability: "Guardar Disponibilidad",
                savedMessage: "Disponibilidad guardada correctamente",
                days: ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"]
            }
        };

        /* ===============================
           🌐 SISTEMA DE IDIOMA
        ================================= */
        function setLanguage(lang) {
            localStorage.setItem("preferredLanguage", lang);
            applyLanguage(lang);
            document.querySelector(".language-select").value = lang;

            createWeek();        // ← recrea los días en el idioma nuevo
            loadAvailability();  // ← vuelve a cargar lo guardado
        }

        function applyLanguage(lang) {
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                el.textContent = translations[lang][key];
            });
            document.title = translations[lang].pageTitle + " | SaaS Product";
        }

        function detectLanguage() {
            const saved = localStorage.getItem("preferredLanguage");
            if (saved === "en" || saved === "es") return saved;
            return navigator.language.startsWith("es") ? "es" : "en";
        }

        /* ===============================
           👤 USUARIO
        ================================= */
        function loadUserData() {
            const email = localStorage.getItem("userEmail");
            if (email) {
                document.getElementById("userEmail").textContent = email;
            }
        }

        function logout() {
            localStorage.removeItem("isLoggedIn");
            localStorage.removeItem("userEmail");
            window.location.href = "login.html";
        }

        /* ===============================
           📂 MENÚ USUARIO
        ================================= */
        function toggleUserMenu() {
            document.getElementById("userDropdown").classList.toggle("open");
        }

        document.addEventListener("click", function (e) {
            const menu = document.querySelector(".user-menu");
            if (!menu.contains(e.target)) {
                document.getElementById("userDropdown").classList.remove("open");
            }
        });

        /* ===============================
           📱 SIDEBAR MOBILE
        ================================= */
        function toggleSidebar() {
            document.querySelector(".sidebar").classList.toggle("open");
            document.querySelector(".sidebar-overlay").classList.toggle("active");
        }

        /* ===============================
           🚀 INICIALIZACIÓN
        ================================= */
        loadUserData();
        const lang = detectLanguage();
        applyLanguage(lang);
        document.querySelector(".language-select").value = lang;

        /* ===============================
           📅 DISPONIBILIDAD
        =================================*/

        let days = []; const container = document.getElementById("weeklyContainer");

        function createWeek() {
            if (!container) return;

            container.innerHTML = "";

            const currentLang = detectLanguage();
            days = translations[currentLang].days;

            days.forEach((day, index) => {
                const div = document.createElement("div");
                div.style.borderBottom = "1px solid #eee";
                div.style.padding = "18px 0";

                div.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <strong>${day}</strong>
            <label class="switch">
                <input type="checkbox" id="toggle-${index}" onchange="toggleDay(${index})">
                <span class="slider"></span>
            </label>
        </div>

        <div id="slots-${index}" style="display:none; margin-top:10px;"></div>

        <button id="add-${index}" onclick="addSlot(${index})"
            style="display:none; margin-top:10px; background:#eef2ff; border:none; padding:6px 12px; border-radius:8px; cursor:pointer;">
            ${translations[currentLang].addTimeSlot}
        </button>
        `;

                container.appendChild(div);
            });
        }

        function toggleDay(index) {
            const checked = document.getElementById(`toggle-${index}`).checked;
            document.getElementById(`slots-${index}`).style.display = checked ? "block" : "none";
            document.getElementById(`add-${index}`).style.display = checked ? "inline-block" : "none";
        }

        function addSlot(index, start = "", end = "") {
            const slot = document.createElement("div");
            slot.style.display = "flex";
            slot.style.gap = "10px";
            slot.style.marginTop = "10px";
            slot.innerHTML = `
    <input type="time" value="${start}" style="padding:6px; border-radius:6px; border:1px solid #ddd;">
    <span>-</span>
    <input type="time" value="${end}" style="padding:6px; border-radius:6px; border:1px solid #ddd;">
    <button onclick="this.parentElement.remove()" style="background:none; border:none; cursor:pointer;">✕</button>
  `;
            document.getElementById(`slots-${index}`).appendChild(slot);
        }

        function applyWeekdays() {
            const mondaySlots = document.querySelectorAll("#slots-0 div");
            if (mondaySlots.length === 0) return;

            for (let i = 1; i <= 4; i++) {
                document.getElementById(`toggle-${i}`).checked = true;
                toggleDay(i);
                document.getElementById(`slots-${i}`).innerHTML = "";
                mondaySlots.forEach(slot => {
                    const inputs = slot.querySelectorAll("input");
                    addSlot(i, inputs[0].value, inputs[1].value);
                });
            }
        }

        function saveAvailability() {
            const data = {
                timezone: document.getElementById("timezone").value,
                days: []
            };

            days.forEach((day, index) => {
                const active = document.getElementById(`toggle-${index}`).checked;
                const slots = [];
                if (active) {
                    document.querySelectorAll(`#slots-${index} div`).forEach(slot => {
                        const inputs = slot.querySelectorAll("input");
                        if (inputs[0].value && inputs[1].value) {
                            slots.push({ start: inputs[0].value, end: inputs[1].value });
                        }
                    });
                }
                data.days.push({ day, active, slots });
            });

            localStorage.setItem("availability", JSON.stringify(data));
            alert(translations[detectLanguage()].savedMessage);
        }

        function loadAvailability() {
            const saved = JSON.parse(localStorage.getItem("availability"));
            if (!saved) return;

            document.getElementById("timezone").value = saved.timezone;

            saved.days.forEach((d, index) => {
                if (d.active) {
                    document.getElementById(`toggle-${index}`).checked = true;
                    toggleDay(index);
                    d.slots.forEach(slot => {
                        addSlot(index, slot.start, slot.end);
                    });
                }
            });
        }

        createWeek();
        loadAvailability();
    </script>

</body>

</html>
